---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: upload
  namespace: immich
spec:
  # RWO is correct for a single server replica. Switch to RWX (+ a RWX-capable
  # backend like NFS/CephFS) only when scaling the server beyond one replica.
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 100Gi

