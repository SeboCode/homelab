---
apiVersion: v1
kind: Secret
metadata:
  name: secret
  namespace: immich
type: Opaque
stringData:
  DB_PASSWORD: changeme-db-password
  DB_USERNAME: immich
  DB_DATABASE_NAME: immich
  # Postgres image reads these to initialise the DB; keep in sync with the DB_* above.
  POSTGRES_USER: immich
  POSTGRES_PASSWORD: changeme-db-password
  POSTGRES_DB: immich

