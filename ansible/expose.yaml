---
- name: Enable firewall to forward dev port
  hosts: localhost
  vars_files:
    - group_vars/charon.yaml
    - group_vars/daisy.yaml
  tasks:
    - name: Enable http service on public interface
      ansible.posix.firewalld:
        service: http
        zone: public
        state: enabled
      become: true
      become_method: sudo

    - name: Enable dev port on public interface
      ansible.posix.firewalld:
        port: "{{ item }}/tcp"
        zone: public
        state: enabled
      loop:
        - "{{ immich_global.container.server.config.port }}"
        - "{{ filebrowser_global.container.server.config.port }}"
        - "{{ photoprism_global.container.server.config.port }}"
        - "{{ gitea_global.container.server.config.port }}"
        - "{{ pihole_global.container.server.config.webserver.port }}"
        - "{{ homeassistant_global.container.server.config.port }}"
        - "{{ homeassistant_global.container.zigbee2mqtt.config.port }}"
        - "{{ karakeep_global.container.server.config.port }}"
        - "{{ miniflux_global.container.server.config.port }}"
        - "{{ mealie_global.container.server.config.port }}"
        - "{{ syncthing_global.container.server.config.port }}"
        - "{{ syncthing_global.container.server.config.sync_port }}"
      become: true
      become_method: sudo

