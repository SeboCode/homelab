---
- name: Ensure ethtool is installed
  ansible.builtin.package:
    name: ethtool
    state: present

- name: Ensure wake-on-lan is configured on boot
  ansible.builtin.copy:
    dest: /etc/systemd/system/wake-on-lan.service
    content: |
      [Unit]
      Description=Enable Wake-on-LAN on eth0
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/sbin/ethtool -s eth0 wol g

      [Install]
      WantedBy=multi-user.target
    owner: root
    group: root
    mode: 0644

- name: Ensure wake-on-lan service is enabled
  ansible.builtin.service:
    name: wake-on-lan
    state: started
    enabled: true

- name: "Ensure {{ wol_poweroff_user }} to power off machine is created"
  ansible.builtin.user:
    name: "{{ wol_poweroff_user }}"
    create_home: true
    home: "/home/{{ wol_poweroff_user }}"
    password_lock: true
    shell: /bin/bash
    state: present

- name: "Ensure {{ wol_poweroff_user }} can turn off the machine without being prompted for a password"
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/{{ wol_poweroff_user }}
    line: "{{ wol_poweroff_user }} ALL=(root) NOPASSWD: /sbin/poweroff"
    state: present
    owner: root
    group: root
    mode: 0440
    create: true
    validate: "visudo -cf %s"

- name: Ensure ssh directory exists
  ansible.builtin.file:
    path: "/home/{{ wol_poweroff_user }}/.ssh"
    state: directory
    owner: "{{ wol_poweroff_user }}"
    group: "{{ wol_poweroff_user }}"
    mode: 0755

- name: Ensure ssh public key is in authorized_keys file
  ansible.builtin.copy:
    dest: "/home/{{ wol_poweroff_user }}/.ssh/authorized_keys"
    content: |
      {{ wol_poweroff_user_ssh_public_key_base64 | b64decode }}
    owner: "{{ wol_poweroff_user }}"
    group: "{{ wol_poweroff_user }}"
    mode: 0600

