---
- name: Ensure zfs is installed
  ansible.builtin.package:
    name:
      - zfsutils-linux
      - zfs-dkms
      - "linux-headers-{{ ansible_facts['kernel'] }}"
    state: present

- name: Ensure zfs kernel module is built
  ansible.builtin.command: dkms autoinstall

- name: Ensure zfs module is loaded
  community.general.modprobe:
    name: zfs
    state: present

- ansible.builtin.import_role:
    name: infrastructure/build-vars
  vars:
    service: zfs

- name: Ensure toplevel zpool for service data is created
  community.general.zpool:
    name: "{{ zfs.service_data_pool_name }}"
    state: present
    filesystem_properties:
      compression: lz4
    vdevs:
      - disks: "{{ zfs.devices }}"
        type: mirror

- name: Ensure zfs-load-key is unmasked
  ansible.builtin.systemd:
    name: zfs-load-key
    masked: false

- name: Ensure zfs services are enabled on boot
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - zfs-import-cache
    - zfs-load-key
    - zfs-mount

