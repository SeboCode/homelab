---
- name: Ensure awall syncthing config is available
  ansible.builtin.template:
    src: syncthing.json.j2
    dest: /etc/awall/optional/syncthing.json

- name: Ensure awall syncthing policy is enabled
  community.general.awall:
    name: syncthing
    state: enabled

- name: Ensure awall policies are well defined
  ansible.builtin.command: "awall translate -o /tmp"

- name: Ensure awall policies are active
  community.general.awall:
    activate: true
  async: 3
  poll: 0
  become: true
  become_method: "{{ superuser_method }}"

- name: Sleep to avoid ssh issues due to the awall policy application
  ansible.builtin.pause:
    seconds: 3
