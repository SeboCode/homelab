---
- name: Ensure dnsmasq is installed
  ansible.builtin.package:
    name: dnsmasq
    state: present
  tags:
    - prod-only

- name: Ensure static IP is configured via NetworkManager
  community.general.nmcli:
    conn_name: "{{ dhcp.network.connection_name }}"
    type: ethernet
    ip4: "{{ dhcp.network.static_ip }}/{{ dhcp.network.subnet_prefix }}"
    gw4: "{{ dhcp.network.gateway }}"
    dns4:
      - "127.0.0.1"
    method4: manual
    state: present
  tags:
    - prod-only

- name: Ensure dnsmasq is configured as DHCP-only server
  ansible.builtin.blockinfile:
    path: /etc/dnsmasq.conf
    marker: "# {mark} ANSIBLE MANAGED DHCP CONFIGURATION"
    block: |
      # Disable DNS functionality (pihole handles DNS)
      port=0

      # DHCP range and lease time
      dhcp-range={{ dhcp.range.start }},{{ dhcp.range.end }},{{ dhcp.lease_time }}

      # Default gateway
      dhcp-option=option:router,{{ dhcp.network.gateway }}

      # DNS server (point clients to pihole)
      dhcp-option=option:dns-server,{{ dhcp.network.static_ip }}

      # Static leases
      {% for host in dhcp.static_hosts %}
      dhcp-host={{ host.mac }},{{ host.ip }},{{ host.name }}
      {% endfor %}
    create: false
  tags:
    - prod-only

- name: Ensure DHCP port is allowed in firewall
  community.general.ufw:
    rule: allow
    port: "67"
    proto: udp
  tags:
    - prod-only

- name: Ensure firewall rules are reloaded
  community.general.ufw:
    state: reloaded
  async: 3
  poll: 0
  tags:
    - prod-only

- name: Ensure dnsmasq is enabled and restarted
  ansible.builtin.systemd:
    name: dnsmasq
    enabled: true
    state: restarted
  tags:
    - prod-only

