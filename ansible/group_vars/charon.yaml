---
platform: alpine
processor_microcode_package: intel-ucode

zfs_global:
  service_data_pool_name: service-data

immich_global:
  user:
    name: immich-user
  data_storage:
    filesystem: zfs
    root: "/{{ zfs.service_data_pool_name }}/immich-storage"
  container:
    network: immich_network
    server:
      image: ghcr.io/immich-app/immich-server
      tag: v2.4.1
      config:
        port: 20000
      storage:
        upload: "{{ immich_global.data_storage.root }}/library"
    machine_learning:
      image: ghcr.io/immich-app/immich-machine-learning
      tag: v2.4.1
    redis:
      image: docker.io/valkey/valkey
      tag: 9@sha256:fb8d272e529ea567b9bf1302245796f21a2672b8368ca3fcb938ac334e613c8f
      storage:
        data: "{{ immich_global.data_storage.root }}/redis"
    postgres:
      image: ghcr.io/immich-app/postgres
      tag: 14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
      config:
        db:
          name: immich_database
          username: immich_pg_user
      storage:
        data: "{{ immich_global.data_storage.root }}/postgres"

filebrowser_global:
  user:
    name: filebrowser-user
  data_storage:
    filesystem: zfs
    root: "/{{ zfs.service_data_pool_name }}/filebrowser-storage"
  container:
    network: filebrowser_network
    server:
      image: docker.io/filebrowser/filebrowser
      tag: v2.53.1
      config:
        port: 20100
      storage:
        config: "{{ filebrowser_global.data_storage.root }}/config"
        data: "{{ filebrowser_global.data_storage.root }}/data"
        db_data: "{{ filebrowser_global.data_storage.root }}/database"

photoprism_global:
  user:
    name: photoprism-user
  data_storage:
    filesystem: zfs
    root: "/{{ zfs.service_data_pool_name }}/photoprism-storage"
  container:
    network: photoprism_network
    server:
      image: docker.io/photoprism/photoprism
      tag: 251130
      config:
        port: 20200
      storage:
        originals: "{{ photoprism_global.data_storage.root }}/originals"
        storage: "{{ photoprism_global.data_storage.root }}/storage"
    mariadb:
      image: docker.io/mariadb
      tag: 11.8.5
      config:
        db:
          name: photoprism_database
          username: photoprism_mariadb_user
      storage:
        data: "{{ photoprism_global.data_storage.root }}/mariadb"

gitea_global:
  user:
    name: gitea-user
  data_storage:
    filesystem: zfs
    root: "/{{ zfs.service_data_pool_name }}/gitea-storage"
  container:
    network: gitea_network
    server:
      image: docker.gitea.com/gitea
      tag: 1.25.3-rootless
      config:
        port: 20300
        ssh_port: 20322
      storage:
        data: "{{ gitea_global.data_storage.root }}/data"
        config: "{{ gitea_global.data_storage.root }}/config"
    postgres:
      image: docker.io/postgres
      tag: 14.20
      config:
        db:
          name: gitea_database
          username: gitea_pg_user
      storage:
        data: "{{ gitea_global.data_storage.root }}/postgres"

mediastack_global:
  user:
    name: mediastack-user
  data_storage:
    filesystem: ext4
    root: "/home/{{ mediastack_global.user.name }}/mediastack-storage"
  shared_storage:
    downloads: "{{ mediastack_global.data_storage.root }}/downloads"
    movies: "{{ mediastack_global.data_storage.root }}/media/movies"
    tv: "{{ mediastack_global.data_storage.root }}/media/tv"
  container:
    network: mediastack_network
    jellyfin:
      image: docker.io/jellyfin/jellyfin
      tag: 2026030205
      config:
        port: 20400
      storage:
        config: "{{ mediastack_global.data_storage.root }}/jellyfin/config"
        cache: "{{ mediastack_global.data_storage.root }}/jellyfin/cache"
    radarr:
      image: docker.io/linuxserver/radarr
      tag: 6.0.4
      config:
        port: 20410
      storage:
        config: "{{ mediastack_global.data_storage.root }}/radarr/config"
    sonarr:
      image: docker.io/linuxserver/sonarr
      tag: 4.0.16
      config:
        port: 20420
      storage:
        config: "{{ mediastack_global.data_storage.root }}/sonarr/config"
    prowlarr:
      image: docker.io/linuxserver/prowlarr
      tag: 2.3.0
      config:
        port: 20430
      storage:
        config: "{{ mediastack_global.data_storage.root }}/prowlarr/config"
    deluge:
      enabled: true
      image: docker.io/binhex/arch-delugevpn
      tag: 2.2.0-1-04
      config:
        port: 20440
      storage:
        config: "{{ mediastack_global.data_storage.root }}/deluge/config"
        data: "{{ mediastack_global.data_storage.root }}/deluge/data"

